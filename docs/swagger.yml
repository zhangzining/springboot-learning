openapi: 3.0.0
info:
  title: 示例 API
  description: 这是一个基本的 Swagger API 文档示例
  version: 1.0.0
servers:
  - url: http://api.example.com/v1
    description: 生产环境服务器
  - url: http://dev.api.example.com/v1
    description: 开发环境服务器

paths:
  /users:
    get:
      summary: 获取所有用户
      description: 返回系统中所有用户的列表
      parameters:
        - name: page
          in: query
          description: 页码
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: 每页数量
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 成功返回用户列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    description: 总用户数
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
    post:
      summary: 创建新用户
      description: 在系统中创建一个新用户
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInput'
      responses:
        '201':
          description: 用户创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: 无效的请求数据

  /users/{id}:
    get:
      summary: 获取指定用户
      description: 根据ID返回单个用户信息
      parameters:
        - name: id
          in: path
          required: true
          description: 用户ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功返回用户信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: 用户不存在

components:
  schemas:
    UserInput:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          description: 用户名
        email:
          type: string
          format: email
          description: 用户邮箱
        age:
          type: integer
          minimum: 0
          description: 用户年龄（可选）

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: 用户唯一标识
        name:
          type: string
          description: 用户名
        email:
          type: string
          format: email
          description: 用户邮箱
        age:
          type: integer
          description: 用户年龄
        createdAt:
          type: string
          format: date-time
          description: 创建时间